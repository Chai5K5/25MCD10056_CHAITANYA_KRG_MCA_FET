<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 class="display-4 text-center fw-bold mt-3">Smart To-Do</h1>

    <div class="container mt-4">

        <div class="row g-3">
            <div class="col-md-5">
                <input type="text" id="task_input" class="form-control" placeholder="Enter Task">
            </div>

            <div class="col-md-3">
                <select id="priority" class="form-select">
                    <option value="">Priority</option>
                    <option value="3">High</option>
                    <option value="2">Medium</option>
                    <option value="1">Low</option>
                </select>
            </div>

            <div class="col-md-3">
                <input type="date" id="deadline" class="form-control">
            </div>

            <div class="col-md-1 d-grid">
                <button id="add_task" class="btn btn-primary">Add</button>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-primary filter-btn" data-filter="all">All</button>
            <button class="btn btn-outline-success filter-btn" data-filter="completed">Completed</button>
            <button class="btn btn-outline-warning filter-btn" data-filter="pending">Pending</button>
        </div>

        <div class="mt-3">
            <select id="sort" class="form-select w-auto">
                <option value="">Sort By</option>
                <option value="priority">Priority (High → Low)</option>
                <option value="deadline">Deadline (Nearest)</option>
            </select>
        </div>

        <div class="mt-3">
            <span>Total: <strong id="total"></strong></span> |
            <span>Completed: <strong id="completed"></strong></span> |
            <span>Pending: <strong id="pending"></strong></span>
        </div>

        <div id="tasks_container" class="mt-4"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
